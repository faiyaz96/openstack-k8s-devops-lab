apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/faiyaz96/openstack-k8s-devops-lab.git'    
    targetRevision: main
    path: helm/devops-demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
